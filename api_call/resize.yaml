# =====================================================================
#
# Resizes a Nutanix VM (CPU and/or memory) via direct Prism v3 API calls.
# Credentials are retrieved from CyberArk through the existing
# Templates/cyberarkAuth.yaml job (which exports NUTANIX_USERNAME,
# NUTANIX_PASSWORD and NUTANIX_ENDPOINT as job-output variables).
# =====================================================================

parameters:
  - name: LIST_VMS
    displayName: 'List all VMs first (for reference)'
    type: boolean
    default: false

  - name: VM_NAME
    displayName: 'VM Name'
    type: string
    default: ''

  - name: VM_UUID
    displayName: 'VM UUID (alternative to VM_NAME)'
    type: string
    default: ''

  - name: CPU_NUM
    displayName: 'Desired total number of vCPUs'
    type: string
    default: ''
    values:
      - ''
      - '2'
      - '4'
      - '8'
      - '16'

  - name: MEMORY_SIZE_GB
    displayName: 'New Memory size in GB'
    type: string
    default: ''

  - name: STOP_VM
    displayName: 'Stop VM before resize if currently ON'
    type: boolean
    default: true

  - name: use_cyberArk
    displayName: 'Use CyberArk to retrieve Nutanix credentials'
    type: boolean
    default: false

  - name: TEST_RUN
    type: boolean
    default: true


trigger: none

pool: self-hosted-ubuntu

name: 'VM Resize | ${{ coalesce(parameters.VM_NAME, parameters.VM_UUID) }} | CPU:${{ parameters.CPU_NUM }} RAM:${{ parameters.MEMORY_SIZE_GB }}GB'

# Credentials and CyberArk configuration are pulled from this variable group:
#   - When use_cyberArk = false: PRISM_USERNAME, PRISM_PASSWORD, PRISM_ELEMENT_FQDN
#   - When use_cyberArk = true:  CYBERARK_CCP_URL, CYBERARK_APP_ID, CYBERARK_SAFE,
#                                CYBERARK_OBJECT, NUTANIX_CLUSTER_URL,
#                                CYBERARK_CLIENT_CERT_PATH
# In both cases values are remapped onto NUTANIX_USERNAME / NUTANIX_PASSWORD /
# NUTANIX_ENDPOINT at job scope below so that the bash steps stay identical
# regardless of the credential source.
variables:
  - group: ccoe-nutanix-automation


stages:
  - stage: ResizeVM
    displayName: 'Resize Nutanix VM'

    jobs:

      # ----------------------------------------------------------------------------------------------
      # 1) Validate input parameters (CPU_NUM / MEMORY_SIZE_GB)
      # ----------------------------------------------------------------------------------------------
      - job: ValidateInputParameters
        displayName: 'Validate Input Parameters'
        steps:
          - bash: |
              set -e

              CPU_NUM="${{ parameters.CPU_NUM }}"
              MEMORY_GB="${{ parameters.MEMORY_SIZE_GB }}"

              echo "Provided CPU_NUM:    '${CPU_NUM}'"
              echo "Provided MEMORY_SIZE_GB: '${MEMORY_GB}'"

              # At least one of the two must be provided
              if [ -z "$CPU_NUM" ] && [ -z "$MEMORY_GB" ]; then
                echo "##vso[task.logissue type=error]At least one of CPU_NUM or MEMORY_SIZE_GB must be specified"
                exit 1
              fi

              # Helper: validate a value is a positive integer
              is_positive_integer() {
                case "$1" in
                  ''|*[!0-9]*) return 1 ;;
                  0) return 1 ;;
                  *) return 0 ;;
                esac
              }

              if [ -n "$CPU_NUM" ]; then
                if ! is_positive_integer "$CPU_NUM"; then
                  echo "##vso[task.logissue type=error]CPU_NUM must be a positive integer (got: '$CPU_NUM')"
                  exit 1
                fi
                echo "✅ CPU_NUM is valid: $CPU_NUM"
              fi

              if [ -n "$MEMORY_GB" ]; then
                if ! is_positive_integer "$MEMORY_GB"; then
                  echo "##vso[task.logissue type=error]MEMORY_SIZE_GB must be a positive integer (got: '$MEMORY_GB')"
                  exit 1
                fi
                echo "✅ MEMORY_SIZE_GB is valid: $MEMORY_GB"
              fi

              echo "✅ Input parameter validation passed"
            displayName: 'Validate CPU_NUM and MEMORY_SIZE_GB'

      # ----------------------------------------------------------------------------------------------
      # 2) (Optional until CyberArk integration is complete) Fetch Nutanix credentials from CyberArk
      # ----------------------------------------------------------------------------------------------
      - ${{ if eq(parameters.use_cyberArk, true) }}:
          - template: ../Templates/cyberarkAuth.yaml
            parameters:
              dependsOn: ValidateInputParameters
              cyberark_ccp_url: $(CYBERARK_CCP_URL)
              cyberark_app_id: $(CYBERARK_APP_ID)
              cyberark_safe: $(CYBERARK_SAFE)
              cyberark_object: $(CYBERARK_OBJECT)
              nutanix_cluster_url: $(NUTANIX_CLUSTER_URL)
              cyberark_client_cert_path: $(CYBERARK_CLIENT_CERT_PATH)
              TEST_RUN: ${{ parameters.TEST_RUN }}

      # ----------------------------------------------------------------------------------------------
      # 2) Validate that the requested spec differs from the current one
      # ----------------------------------------------------------------------------------------------
      - job: ValidateSpec
        displayName: 'Validate current spec'
        dependsOn:
          - ValidateInputParameters
          - ${{ if eq(parameters.use_cyberArk, true) }}:
              - CyberArkAuth
        variables:
          ${{ if eq(parameters.use_cyberArk, true) }}:
            NUTANIX_USERNAME: $[ dependencies.CyberArkAuth.outputs['retrieveCredentials.NUTANIX_USERNAME'] ]
            NUTANIX_PASSWORD: $[ dependencies.CyberArkAuth.outputs['retrieveCredentials.NUTANIX_PASSWORD'] ]
            NUTANIX_ENDPOINT: $[ dependencies.CyberArkAuth.outputs['retrieveCredentials.NUTANIX_ENDPOINT'] ]
          ${{ else }}:
            NUTANIX_USERNAME: $(PRISM_USERNAME)
            NUTANIX_PASSWORD: $(PRISM_PASSWORD)
            NUTANIX_ENDPOINT: $(PRISM_ELEMENT_FQDN)
        steps:

          - bash: |
              set -e

              API_URL="https://${NUTANIX_ENDPOINT}:9440/api/nutanix/v3/clusters/list"

              AUTH_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                -X POST \
                -H "Content-Type: application/json" \
                -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                -d '{"kind": "cluster", "length": 1}' \
                "$API_URL")

              HTTP_CODE=$(echo "$AUTH_RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$AUTH_RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "Prism authentication check passed"
                exit 0
              fi

              if [ "$HTTP_CODE" = "401" ]; then
                echo "##vso[task.logissue type=error]Prism authentication failed (HTTP 401). Verify NUTANIX_USERNAME and NUTANIX_PASSWORD."
              else
                echo "##vso[task.logissue type=error]Prism preflight check failed (HTTP $HTTP_CODE). Verify endpoint/credentials/network."
              fi

              echo "$RESPONSE_BODY" | jq '.' 2>/dev/null || echo "$RESPONSE_BODY"
              exit 1
            displayName: 'Validate Prism authentication'
            env:
              NUTANIX_ENDPOINT: $(NUTANIX_ENDPOINT)
              NUTANIX_USERNAME: $(NUTANIX_USERNAME)
              NUTANIX_PASSWORD: $(NUTANIX_PASSWORD)

          - bash: |
              set -e

              VM_NAME="${{ parameters.VM_NAME }}"
              VM_UUID="${{ parameters.VM_UUID }}"
              API_URL="https://${NUTANIX_ENDPOINT}:9440/api/nutanix/v3"

              echo "========================================="
              echo "  Getting VM Details"
              echo "========================================="

              if [ -z "$VM_NAME" ] && [ -z "$VM_UUID" ]; then
                echo "##vso[task.logissue type=error]Either VM_NAME or VM_UUID is required"
                exit 1
              fi

              if [ -n "$VM_UUID" ]; then
                echo ">>> Searching by UUID: $VM_UUID"
                VM_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                  -X GET \
                  -H "Content-Type: application/json" \
                  -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                  "${API_URL}/vms/${VM_UUID}")
              else
                echo ">>> Searching by name: $VM_NAME"
                VM_LIST_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                  -X POST \
                  -H "Content-Type: application/json" \
                  -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                  -d "{\"kind\": \"vm\", \"filter\": \"vm_name==${VM_NAME}\"}" \
                  "${API_URL}/vms/list")

                HTTP_CODE=$(echo "$VM_LIST_RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$VM_LIST_RESPONSE" | sed '$d')

                if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                  ENTITY=$(echo "$RESPONSE_BODY" | jq '.entities[0]')
                  if [ "$ENTITY" = "null" ] || [ -z "$ENTITY" ]; then
                    echo "##vso[task.logissue type=error]VM not found: $VM_NAME"
                    exit 1
                  fi
                  VM_RESPONSE=$(printf "%s\n%s" "$ENTITY" "$HTTP_CODE")
                else
                  echo "##vso[task.logissue type=error]Failed to search VM by name (HTTP $HTTP_CODE)"
                  echo "$RESPONSE_BODY" | jq '.' 2>/dev/null || echo "$RESPONSE_BODY"
                  exit 1
                fi
              fi

              HTTP_CODE=$(echo "$VM_RESPONSE" | tail -n1)
              VM_DATA=$(echo "$VM_RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
                echo "##vso[task.logissue type=error]Failed to fetch VM details (HTTP $HTTP_CODE)"
                echo "$VM_DATA" | jq '.' 2>/dev/null || echo "$VM_DATA"
                exit 1
              fi

              VM_UUID=$(echo "$VM_DATA" | jq -r '.metadata.uuid')
              VM_NAME=$(echo "$VM_DATA" | jq -r '.spec.name')
              CURRENT_VCPUS=$(echo "$VM_DATA" | jq -r '.spec.resources.num_vcpus_per_socket')
              CURRENT_SOCKETS=$(echo "$VM_DATA" | jq -r '.spec.resources.num_sockets')
              CURRENT_MEMORY_MIB=$(echo "$VM_DATA" | jq -r '.spec.resources.memory_size_mib')
              CURRENT_MEMORY_GB=$((CURRENT_MEMORY_MIB / 1024))
              POWER_STATE=$(echo "$VM_DATA" | jq -r '.spec.resources.power_state')

              echo "✅ VM Found!"
              echo "  Name: $VM_NAME"
              echo "  UUID: $VM_UUID"
              echo "  Current vCPUs/socket: $CURRENT_VCPUS"
              echo "  Current Sockets: $CURRENT_SOCKETS"
              echo "  Current Memory: ${CURRENT_MEMORY_GB}GB"
              echo "  Power State: $POWER_STATE"

              # Persist outputs for downstream steps and the ResizeVM job
              echo "##vso[task.setvariable variable=vm_uuid;isOutput=true]$VM_UUID"
              echo "##vso[task.setvariable variable=vm_name;isOutput=true]$VM_NAME"
              echo "##vso[task.setvariable variable=current_vcpus;isOutput=true]$CURRENT_VCPUS"
              echo "##vso[task.setvariable variable=current_sockets;isOutput=true]$CURRENT_SOCKETS"
              echo "##vso[task.setvariable variable=current_memory_gb;isOutput=true]$CURRENT_MEMORY_GB"
              echo "##vso[task.setvariable variable=power_state;isOutput=true]$POWER_STATE"
            name: getVm
            displayName: 'Get VM details'
            env:
              NUTANIX_ENDPOINT: $(NUTANIX_ENDPOINT)
              NUTANIX_USERNAME: $(NUTANIX_USERNAME)
              NUTANIX_PASSWORD: $(NUTANIX_PASSWORD)

          - bash: |
              set -e

              CPU_NUM="${{ parameters.CPU_NUM }}"
              MEMORY_GB="${{ parameters.MEMORY_SIZE_GB }}"

              # Reuse the VM details already fetched by the getVm step (no extra API call).
              CURRENT_VCPUS="$(getVm.current_vcpus)"
              CURRENT_SOCKETS="$(getVm.current_sockets)"
              CURRENT_MEMORY_GB="$(getVm.current_memory_gb)"
              CURRENT_TOTAL_CPU=$((CURRENT_VCPUS * CURRENT_SOCKETS))

              echo "Current spec: CPU=$CURRENT_TOTAL_CPU, Memory=${CURRENT_MEMORY_GB}GB"

              # Compare only the parameters that were actually provided.
              CPU_DIFFERS=false
              MEMORY_DIFFERS=false

              if [ -n "$CPU_NUM" ]; then
                echo "Requested CPU: $CPU_NUM (current: $CURRENT_TOTAL_CPU)"
                if [ "$CPU_NUM" -ne "$CURRENT_TOTAL_CPU" ]; then
                  CPU_DIFFERS=true
                fi
              else
                echo "CPU not requested → skipping CPU comparison"
              fi

              if [ -n "$MEMORY_GB" ]; then
                echo "Requested Memory: ${MEMORY_GB}GB (current: ${CURRENT_MEMORY_GB}GB)"
                if [ "$MEMORY_GB" -ne "$CURRENT_MEMORY_GB" ]; then
                  MEMORY_DIFFERS=true
                fi
              else
                echo "Memory not requested → skipping memory comparison"
              fi

              if [ "$CPU_DIFFERS" = "false" ] && [ "$MEMORY_DIFFERS" = "false" ]; then
                echo "##vso[task.setvariable variable=spec_is_different;isOutput=true]false"
                echo "ℹ️  No resize needed. Provided value(s) already match the current VM spec."
                exit 0
              fi

              echo "##vso[task.setvariable variable=spec_is_different;isOutput=true]true"
              echo "✅ Validation passed: at least one provided value differs from current VM spec"
            name: validateSpec
            displayName: 'Validate requested spec differs from current'


      # ----------------------------------------------------------------------------------------------
      # 3) Resize the VM 
      # ----------------------------------------------------------------------------------------------
      - job: ResizeVM
        displayName: 'Resize VM'
        dependsOn:
          - ValidateSpec
          - ${{ if eq(parameters.use_cyberArk, true) }}:
              - CyberArkAuth
        condition: and(succeeded(), eq(dependencies.ValidateSpec.outputs['validateSpec.spec_is_different'], 'true'))
        variables:
          ${{ if eq(parameters.use_cyberArk, true) }}:
            NUTANIX_USERNAME: $[ dependencies.CyberArkAuth.outputs['retrieveCredentials.NUTANIX_USERNAME'] ]
            NUTANIX_PASSWORD: $[ dependencies.CyberArkAuth.outputs['retrieveCredentials.NUTANIX_PASSWORD'] ]
            NUTANIX_ENDPOINT: $[ dependencies.CyberArkAuth.outputs['retrieveCredentials.NUTANIX_ENDPOINT'] ]
            vm_uuid: $[ dependencies.ValidateSpec.outputs['getVm.vm_uuid'] ]
            vm_name: $[ dependencies.ValidateSpec.outputs['getVm.vm_name'] ]
            power_state: $[ dependencies.ValidateSpec.outputs['getVm.power_state'] ]
            current_vcpus: $[ dependencies.ValidateSpec.outputs['getVm.current_vcpus'] ]
            current_sockets: $[ dependencies.ValidateSpec.outputs['getVm.current_sockets'] ]
            current_memory_gb: $[ dependencies.ValidateSpec.outputs['getVm.current_memory_gb'] ]
          ${{ else }}:
            NUTANIX_USERNAME: $(PRISM_USERNAME)
            NUTANIX_PASSWORD: $(PRISM_PASSWORD)
            NUTANIX_ENDPOINT: $(PRISM_ELEMENT_FQDN)
            vm_uuid: $[ dependencies.ValidateSpec.outputs['getVm.vm_uuid'] ]
            vm_name: $[ dependencies.ValidateSpec.outputs['getVm.vm_name'] ]
            power_state: $[ dependencies.ValidateSpec.outputs['getVm.power_state'] ]
            current_vcpus: $[ dependencies.ValidateSpec.outputs['getVm.current_vcpus'] ]
            current_sockets: $[ dependencies.ValidateSpec.outputs['getVm.current_sockets'] ]
            current_memory_gb: $[ dependencies.ValidateSpec.outputs['getVm.current_memory_gb'] ]
        steps:
          - checkout: self
            clean: true

          - bash: |
              set -e

              VM_UUID="$(vm_uuid)"
              POWER_STATE="$(power_state)"
              STOP_VM="${{ lower(parameters.STOP_VM) }}"
              API_URL="https://${NUTANIX_ENDPOINT}:9440/api/nutanix/v3"

              echo ">>> VM Power State: $POWER_STATE"
              echo ">>> stop_vm: $STOP_VM"
              echo "##vso[task.setvariable variable=initial_power_state;isOutput=true]$POWER_STATE"
              echo "##vso[task.setvariable variable=vm_stopped;isOutput=true]false"

              if [ "$POWER_STATE" != "OFF" ]; then
                echo "⚠️  Warning: VM is currently powered $POWER_STATE"
                echo "   Note: Some VM properties can only be modified when powered OFF"
              fi

              if [ "$POWER_STATE" = "ON" ] && [ "$STOP_VM" = "true" ]; then
                echo ">>> Stopping VM before resize..."

                STOP_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                  -X POST \
                  -H "Content-Type: application/json" \
                  -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                  -d '{"transition": "OFF"}' \
                  "${API_URL}/vms/${VM_UUID}/set_power_state")

                HTTP_CODE=$(echo "$STOP_RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$STOP_RESPONSE" | sed '$d')

                # Fallback: some Prism deployments don't expose /set_power_state on v3
                if [ "$HTTP_CODE" = "404" ]; then
                  echo "ℹ️  set_power_state endpoint not found, falling back to VM update API"

                  VM_GET_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                    -X GET \
                    -H "Content-Type: application/json" \
                    -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                    "${API_URL}/vms/${VM_UUID}")

                  VM_GET_HTTP=$(echo "$VM_GET_RESPONSE" | tail -n1)
                  VM_GET_BODY=$(echo "$VM_GET_RESPONSE" | sed '$d')
                  if [ "$VM_GET_HTTP" -lt 200 ] || [ "$VM_GET_HTTP" -ge 300 ]; then
                    echo "##vso[task.logissue type=error]Fallback GET VM failed (HTTP $VM_GET_HTTP)"
                    echo "$VM_GET_BODY" | jq '.' || echo "$VM_GET_BODY"
                    exit 1
                  fi

                  FALLBACK_PAYLOAD=$(echo "$VM_GET_BODY" | jq '.spec.resources.power_state = "OFF"' | jq 'del(.status)')

                  STOP_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                    -X PUT \
                    -H "Content-Type: application/json" \
                    -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                    -d "$FALLBACK_PAYLOAD" \
                    "${API_URL}/vms/${VM_UUID}")

                  HTTP_CODE=$(echo "$STOP_RESPONSE" | tail -n1)
                  RESPONSE_BODY=$(echo "$STOP_RESPONSE" | sed '$d')
                fi

                if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
                  echo "##vso[task.logissue type=error]Failed to send stop request (HTTP $HTTP_CODE)"
                  echo "$RESPONSE_BODY" | jq '.' || echo "$RESPONSE_BODY"
                  exit 1
                fi

                TASK_UUID=$(echo "$RESPONSE_BODY" | jq -r '.status.execution_context.task_uuid // empty')
                if [ -z "$TASK_UUID" ]; then
                  echo "##vso[task.logissue type=error]Stop task UUID was not returned"
                  exit 1
                fi

                echo ">>> Monitoring stop task: $TASK_UUID"
                MAX_ATTEMPTS=60
                ATTEMPT=0

                while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                  TASK_RESPONSE=$(curl -s -k \
                    -X GET \
                    -H "Content-Type: application/json" \
                    -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                    "${API_URL}/tasks/${TASK_UUID}")

                  STATUS=$(echo "$TASK_RESPONSE" | jq -r '.status // "UNKNOWN"')
                  PROGRESS=$(echo "$TASK_RESPONSE" | jq -r '.progress_message // "In progress..."')

                  case $STATUS in
                    SUCCEEDED)
                      echo "✅ VM stopped successfully"
                      echo "##vso[task.setvariable variable=vm_stopped;isOutput=true]true"
                      break
                      ;;
                    FAILED)
                      echo "##vso[task.logissue type=error]VM stop task failed"
                      echo "$TASK_RESPONSE" | jq '.'
                      exit 1
                      ;;
                    *)
                      echo "⏳ Stop Status: $STATUS | Progress: $PROGRESS"
                      ATTEMPT=$((ATTEMPT + 1))
                      sleep 5
                      ;;
                  esac
                done

                if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
                  echo "##vso[task.logissue type=error]Timed out waiting for VM stop task"
                  exit 1
                fi
              elif [ "$POWER_STATE" = "ON" ] && [ "$STOP_VM" != "true" ]; then
                echo "ℹ️  VM is ON and stop_vm=false, proceeding without stopping"
              else
                echo "ℹ️  VM is not ON, no stop action needed"
              fi
            name: powerCheck
            displayName: 'Check VM power state'
            env:
              NUTANIX_ENDPOINT: $(NUTANIX_ENDPOINT)
              NUTANIX_USERNAME: $(NUTANIX_USERNAME)
              NUTANIX_PASSWORD: $(NUTANIX_PASSWORD)

          - bash: |
              set -e

              VM_UUID="$(vm_uuid)"
              VM_NAME="$(vm_name)"
              API_URL="https://${NUTANIX_ENDPOINT}:9440/api/nutanix/v3/vms/${VM_UUID}"

              # Refresh VM data right before resize to avoid entity version conflicts
              LATEST_VM_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                -X GET \
                -H "Content-Type: application/json" \
                -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                "$API_URL")

              LATEST_HTTP_CODE=$(echo "$LATEST_VM_RESPONSE" | tail -n1)
              VM_DATA=$(echo "$LATEST_VM_RESPONSE" | sed '$d')
              if [ "$LATEST_HTTP_CODE" -lt 200 ] || [ "$LATEST_HTTP_CODE" -ge 300 ]; then
                echo "##vso[task.logissue type=error]Failed to refresh VM details before resize (HTTP $LATEST_HTTP_CODE)"
                echo "$VM_DATA" | jq '.' || echo "$VM_DATA"
                exit 1
              fi

              CURRENT_VCPUS=$(echo "$VM_DATA" | jq -r '.spec.resources.num_vcpus_per_socket')
              CURRENT_SOCKETS=$(echo "$VM_DATA" | jq -r '.spec.resources.num_sockets')
              CURRENT_MEMORY_MIB=$(echo "$VM_DATA" | jq -r '.spec.resources.memory_size_mib')
              CURRENT_MEMORY_GB=$((CURRENT_MEMORY_MIB / 1024))
              CURRENT_TOTAL_CPU=$((CURRENT_VCPUS * CURRENT_SOCKETS))

              CPU_NUM="${{ parameters.CPU_NUM }}"
              MEMORY_GB="${{ parameters.MEMORY_SIZE_GB }}"

              # num_vcpus_per_socket is fixed at 2 (matches GH workflow logic)
              if [ -n "$CPU_NUM" ]; then
                NEW_VCPUS_PER_SOCKET=2
                NEW_SOCKETS=$((CPU_NUM / NEW_VCPUS_PER_SOCKET))
              else
                NEW_VCPUS_PER_SOCKET=$CURRENT_VCPUS
                NEW_SOCKETS=$CURRENT_SOCKETS
                CPU_NUM=$((NEW_VCPUS_PER_SOCKET * NEW_SOCKETS))
              fi

              NEW_MEMORY_MIB=$((${MEMORY_GB:-$CURRENT_MEMORY_GB} * 1024))

              echo "========================================="
              echo "  Resizing VM: $VM_NAME"
              echo "========================================="
              echo "CPU Configuration (num_vcpus_per_socket=2):"
              echo "  Total vCPUs: $CURRENT_TOTAL_CPU → $CPU_NUM"
              echo "    (Sockets: $CURRENT_SOCKETS → $NEW_SOCKETS, vCPUs/socket: 2)"
              echo "Memory: ${CURRENT_MEMORY_GB}GB → $((NEW_MEMORY_MIB / 1024))GB"

              UPDATE_PAYLOAD=$(echo "$VM_DATA" | jq \
                ".spec.resources.num_vcpus_per_socket = $NEW_VCPUS_PER_SOCKET |
                 .spec.resources.num_sockets = $NEW_SOCKETS |
                 .spec.resources.memory_size_mib = $NEW_MEMORY_MIB" | \
                jq 'del(.status)')

              echo ">>> Sending resize request..."

              RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                -X PUT \
                -H "Content-Type: application/json" \
                -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                -d "$UPDATE_PAYLOAD" \
                "$API_URL")

              HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                TASK_UUID=$(echo "$RESPONSE_BODY" | jq -r '.status.execution_context.task_uuid // empty')
                echo "✅ Resize request successful!"
                [ -n "$TASK_UUID" ] && echo "   Task UUID: $TASK_UUID"

                echo "##vso[task.setvariable variable=task_uuid;isOutput=true]$TASK_UUID"
                echo "##vso[task.setvariable variable=success;isOutput=true]true"
                echo "##vso[task.setvariable variable=new_total_vcpus;isOutput=true]$CPU_NUM"
                echo "##vso[task.setvariable variable=new_sockets;isOutput=true]$NEW_SOCKETS"
                echo "##vso[task.setvariable variable=new_vcpus_per_socket;isOutput=true]$NEW_VCPUS_PER_SOCKET"
              else
                echo "##vso[task.logissue type=error]Failed to resize VM (HTTP $HTTP_CODE)"
                echo "$RESPONSE_BODY" | jq '.' || echo "$RESPONSE_BODY"
                exit 1
              fi
            name: resize
            displayName: 'Resize VM'
            env:
              NUTANIX_ENDPOINT: $(NUTANIX_ENDPOINT)
              NUTANIX_USERNAME: $(NUTANIX_USERNAME)
              NUTANIX_PASSWORD: $(NUTANIX_PASSWORD)

          - bash: |
              set -e

              TASK_UUID="$(resize.task_uuid)"
              API_URL="https://${NUTANIX_ENDPOINT}:9440/api/nutanix/v3/tasks/${TASK_UUID}"
              MAX_ATTEMPTS=60
              ATTEMPT=0

              echo ">>> Monitoring resize task: $TASK_UUID"

              while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                RESPONSE=$(curl -s -k \
                  -X GET \
                  -H "Content-Type: application/json" \
                  -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                  "$API_URL")

                STATUS=$(echo "$RESPONSE" | jq -r '.status // "UNKNOWN"')
                PROGRESS=$(echo "$RESPONSE" | jq -r '.progress_message // "In progress..."')

                case $STATUS in
                  SUCCEEDED)
                    echo "✅ Resize task completed successfully!"
                    echo "   Status: $STATUS"
                    echo "   Message: $PROGRESS"
                    exit 0
                    ;;
                  FAILED)
                    echo "❌ Resize task failed!"
                    echo "$RESPONSE" | jq '.'
                    exit 1
                    ;;
                  *)
                    echo "⏳ Status: $STATUS | Progress: $PROGRESS"
                    ATTEMPT=$((ATTEMPT + 1))
                    sleep 5
                    ;;
                esac
              done

              echo "⚠️  Task monitoring timeout after $((MAX_ATTEMPTS * 5)) seconds"
              echo "   Task may still be processing. Check task status: $TASK_UUID"
              exit 0
            displayName: 'Monitor resize task'
            condition: and(succeeded(), ne(variables['resize.task_uuid'], ''))
            env:
              NUTANIX_ENDPOINT: $(NUTANIX_ENDPOINT)
              NUTANIX_USERNAME: $(NUTANIX_USERNAME)
              NUTANIX_PASSWORD: $(NUTANIX_PASSWORD)

          - bash: |
              set -e

              VM_UUID="$(vm_uuid)"
              API_URL="https://${NUTANIX_ENDPOINT}:9440/api/nutanix/v3"

              echo ">>> Starting VM (it was initially ON before resize)..."

              START_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                -X POST \
                -H "Content-Type: application/json" \
                -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                -d '{"transition": "ON"}' \
                "${API_URL}/vms/${VM_UUID}/set_power_state")

              HTTP_CODE=$(echo "$START_RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$START_RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" = "404" ]; then
                echo "ℹ️  set_power_state endpoint not found, falling back to VM update API"

                VM_GET_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                  -X GET \
                  -H "Content-Type: application/json" \
                  -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                  "${API_URL}/vms/${VM_UUID}")

                VM_GET_HTTP=$(echo "$VM_GET_RESPONSE" | tail -n1)
                VM_GET_BODY=$(echo "$VM_GET_RESPONSE" | sed '$d')
                if [ "$VM_GET_HTTP" -lt 200 ] || [ "$VM_GET_HTTP" -ge 300 ]; then
                  echo "##vso[task.logissue type=error]Fallback GET VM failed (HTTP $VM_GET_HTTP)"
                  echo "$VM_GET_BODY" | jq '.' || echo "$VM_GET_BODY"
                  exit 1
                fi

                FALLBACK_PAYLOAD=$(echo "$VM_GET_BODY" | jq '.spec.resources.power_state = "ON"' | jq 'del(.status)')

                START_RESPONSE=$(curl -s -k -w "\n%{http_code}" \
                  -X PUT \
                  -H "Content-Type: application/json" \
                  -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                  -d "$FALLBACK_PAYLOAD" \
                  "${API_URL}/vms/${VM_UUID}")

                HTTP_CODE=$(echo "$START_RESPONSE" | tail -n1)
                RESPONSE_BODY=$(echo "$START_RESPONSE" | sed '$d')
              fi

              if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
                echo "##vso[task.logissue type=error]Failed to send start request (HTTP $HTTP_CODE)"
                echo "$RESPONSE_BODY" | jq '.' || echo "$RESPONSE_BODY"
                exit 1
              fi

              TASK_UUID=$(echo "$RESPONSE_BODY" | jq -r '.status.execution_context.task_uuid // empty')
              if [ -z "$TASK_UUID" ]; then
                echo "##vso[task.logissue type=error]Start task UUID was not returned"
                exit 1
              fi

              echo ">>> Monitoring start task: $TASK_UUID"
              MAX_ATTEMPTS=60
              ATTEMPT=0

              while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                TASK_RESPONSE=$(curl -s -k \
                  -X GET \
                  -H "Content-Type: application/json" \
                  -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                  "${API_URL}/tasks/${TASK_UUID}")

                STATUS=$(echo "$TASK_RESPONSE" | jq -r '.status // "UNKNOWN"')
                PROGRESS=$(echo "$TASK_RESPONSE" | jq -r '.progress_message // "In progress..."')

                case $STATUS in
                  SUCCEEDED)
                    echo "✅ VM started successfully"
                    exit 0
                    ;;
                  FAILED)
                    echo "##vso[task.logissue type=error]VM start task failed"
                    echo "$TASK_RESPONSE" | jq '.'
                    exit 1
                    ;;
                  *)
                    echo "⏳ Start Status: $STATUS | Progress: $PROGRESS"
                    ATTEMPT=$((ATTEMPT + 1))
                    sleep 5
                    ;;
                esac
              done

              echo "##vso[task.logissue type=error]Timed out waiting for VM start task"
              exit 1
            displayName: 'Start VM after resize'
            condition: and(succeeded(), eq(variables['powerCheck.vm_stopped'], 'true'))
            env:
              NUTANIX_ENDPOINT: $(NUTANIX_ENDPOINT)
              NUTANIX_USERNAME: $(NUTANIX_USERNAME)
              NUTANIX_PASSWORD: $(NUTANIX_PASSWORD)

          - bash: |
              VM_UUID="$(vm_uuid)"
              API_URL="https://${NUTANIX_ENDPOINT}:9440/api/nutanix/v3/vms/${VM_UUID}"

              echo ">>> Fetching updated VM configuration..."
              sleep 2

              RESPONSE=$(curl -s -k \
                -X GET \
                -H "Content-Type: application/json" \
                -u "${NUTANIX_USERNAME}:${NUTANIX_PASSWORD}" \
                "$API_URL")

              NEW_VCPUS_PER_SOCKET=$(echo "$RESPONSE" | jq -r '.spec.resources.num_vcpus_per_socket')
              NEW_SOCKETS=$(echo "$RESPONSE" | jq -r '.spec.resources.num_sockets')
              NEW_TOTAL_VCPUS=$((NEW_VCPUS_PER_SOCKET * NEW_SOCKETS))
              NEW_MEMORY_GB=$(($(echo "$RESPONSE" | jq -r '.spec.resources.memory_size_mib') / 1024))

              echo ""
              echo "========================================="
              echo "  VM Configuration Updated"
              echo "========================================="
              echo "Total vCPUs: $NEW_TOTAL_VCPUS (Sockets: $NEW_SOCKETS, vCPUs/socket: $NEW_VCPUS_PER_SOCKET)"
              echo "Memory: ${NEW_MEMORY_GB}GB"
              echo "========================================="
            displayName: 'Verify resize'
            env:
              NUTANIX_ENDPOINT: $(NUTANIX_ENDPOINT)
              NUTANIX_USERNAME: $(NUTANIX_USERNAME)
              NUTANIX_PASSWORD: $(NUTANIX_PASSWORD)

          - bash: |
              SUMMARY_FILE="$(Build.ArtifactStagingDirectory)/vm-resize-summary.md"
              mkdir -p "$(Build.ArtifactStagingDirectory)"

              VM_NAME="$(vm_name)"
              VM_UUID="$(vm_uuid)"
              POWER_STATE="$(power_state)"
              CUR_VCPUS="$(current_vcpus)"
              CUR_SOCKETS="$(current_sockets)"
              CUR_MEM="$(current_memory_gb)"
              CURRENT_TOTAL=$(( CUR_VCPUS * CUR_SOCKETS ))
              NEW_TOTAL="$(resize.new_total_vcpus)"
              NEW_SOCKETS="$(resize.new_sockets)"
              NEW_VCPUS="$(resize.new_vcpus_per_socket)"
              TASK_UUID="$(resize.task_uuid)"

              STATUS_LINE="❌ Resize Failed"
              if [ "$(resize.success)" = "true" ]; then
                STATUS_LINE="✅ Resize Successful"
              fi

              # Compute column widths dynamically so the table always lines up.
              PROP_W=16
              BEFORE_W=0
              AFTER_W=0
              for v in "$VM_NAME" "$VM_UUID" "$CURRENT_TOTAL" "$CUR_SOCKETS" "$CUR_VCPUS" "${CUR_MEM}GB" "$POWER_STATE" "-"; do
                [ ${#v} -gt $BEFORE_W ] && BEFORE_W=${#v}
              done
              for v in "$VM_NAME" "$VM_UUID" "$NEW_TOTAL" "$NEW_SOCKETS" "$NEW_VCPUS" "-" "$TASK_UUID"; do
                [ ${#v} -gt $AFTER_W ] && AFTER_W=${#v}
              done
              # Ensure widths are at least as wide as the header text
              [ $BEFORE_W -lt 6 ] && BEFORE_W=6
              [ $AFTER_W  -lt 5 ] && AFTER_W=5

              ROW_FMT="| %-${PROP_W}s | %-${BEFORE_W}s | %-${AFTER_W}s |\n"
              SEP_PROP=$(printf '%*s' $PROP_W   '' | tr ' ' '-')
              SEP_BEF=$(printf  '%*s' $BEFORE_W '' | tr ' ' '-')
              SEP_AFT=$(printf  '%*s' $AFTER_W  '' | tr ' ' '-')

              {
                echo "## VM Resize Summary"
                echo
                printf "$ROW_FMT" "Property" "Before" "After"
                printf "|-%s-|-%s-|-%s-|\n" "$SEP_PROP" "$SEP_BEF" "$SEP_AFT"
                printf "$ROW_FMT" "VM Name"          "$VM_NAME"       "$VM_NAME"
                printf "$ROW_FMT" "VM UUID"          "$VM_UUID"       "$VM_UUID"
                printf "$ROW_FMT" "Total vCPUs"      "$CURRENT_TOTAL" "$NEW_TOTAL"
                printf "$ROW_FMT" "Sockets"          "$CUR_SOCKETS"   "$NEW_SOCKETS"
                printf "$ROW_FMT" "vCPUs per Socket" "$CUR_VCPUS"     "$NEW_VCPUS"
                printf "$ROW_FMT" "Memory"           "${CUR_MEM}GB"   "-"
                printf "$ROW_FMT" "Power State"      "$POWER_STATE"   "-"
                printf "$ROW_FMT" "Task UUID"        "-"              "$TASK_UUID"
                echo
                echo "### Status"
                echo "$STATUS_LINE"
              } > "$SUMMARY_FILE"

              echo "Summary written to $SUMMARY_FILE"
              cat "$SUMMARY_FILE"
            displayName: 'Job Summary'
            condition: always()

          # - publish: $(Build.ArtifactStagingDirectory)/vm-resize-summary.md
          #   artifact: vm-resize-summary
          #   displayName: 'Publish resize summary'
          #   condition: always()
