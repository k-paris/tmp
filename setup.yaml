parameters:
  - name: RESOURCE_TYPE
    type: string
    default: 'vm'
    values:
      - vm
  - name: OPERATION_TYPE
    type: string
    default: 'MODIFY'
    values:
      - MODIFY
  - name: ACTION
    type: string
    default: 'RESIZE'
    values:
      - RESIZE
  - name: SCTASKID
    type: string
    default: ''
  - name: UUID               # UUID of the VM to be powercycled
    type: string
    default: ''
  - name: HOST_UUID          # HostName of the VM
    type: string
    default: ''
  - name: IAC_TOOL
    type: string
    default: 'OPENTOFU'
    values:
      - 'OPENTOFU'
      - 'TERRAFORM'
  - name: TEST_RUN
    type: boolean
    default: true
  - name: NUM_SOCKETS
    type: number
    default: null
  - name: MEMORY_SIZE_MIB
    type: number
    default: null


trigger: none

pool: self-hosted-ubuntu

resources:
  repositories:
    - repository: self
      type: git
    - repository: nutanixProvisioning
      type: git
      name: CCOE/Belfius.CCoE.Nutanix.Provisioning
      # endpoint: <service-connection-name>   # required only if the repo needs a service connection


variables:
  - name: nutanix_iac_repo_path
    value: 'Belfius.CCoE.Nutanix.IaC'
  - name: nutanix_pipeline_repo_path
    value: 'Belfius.CCoE.Nutanix.Provisioning'
  - name: resource_config
    value: ''


stages:
  - stage: ResizeVM
    displayName: 'Resize VM'

    jobs:

      - job: CheckoutSelf

        steps:
          - checkout: self
            displayName: 'Checkout Self'
            clean: true

      - script: |
              # Validate that at least one parameter is provided
              NUM_SOCKETS="${{ parameters.NUM_SOCKETS }}"
              MEMORY_SIZE_MIB="${{ parameters.MEMORY_SIZE_MIB }}"

              echo ""
              echo -e "\e[32m========================================"
              echo -e "\e[32m       PIPELINE PARAMETERS VALIDATION" 
              echo -e "\e[32m======================================="
              echo ""
              
              if [ -z "$NUM_SOCKETS" ] && [ -z "$MEMORY_SIZE_MIB" ]; then
                echo "##vso[task.logissue type=error]At least one of NUM_SOCKETS or MEMORY_SIZE_MIB must be provided"
                exit 1
              fi
              
              # Validate NUM_SOCKETS is a number if provided
              if [ -n "$NUM_SOCKETS" ] && ! [[ "$NUM_SOCKETS" =~ ^[0-9]+$ ]]; then
                echo "##vso[task.logissue type=error]NUM_SOCKETS must be a valid number"
                exit 1
              fi
              
              # Validate MEMORY_SIZE_MIB is a number if provided
              if [ -n "$MEMORY_SIZE_MIB" ] && ! [[ "$MEMORY_SIZE_MIB" =~ ^[0-9]+$ ]]; then
                echo "##vso[task.logissue type=error]MEMORY_SIZE_MIB must be a valid number"
                exit 1
              fi
              
              echo -e "\e[32mValidation passed for pipeline parameters\e[0m"
              echo "NUM_SOCKETS: $NUM_SOCKETS"
              echo "MEMORY_SIZE_MIB: $MEMORY_SIZE_MIB"

              echo ""
              echo -e "\e[32m========================================"
              echo -e "\e[32m       BUILDING RESOURCE CONFIGURATION JSON" 
              echo -e "\e[32m======================================="
              echo ""

              # Build resource_config JSON starting with hostname
              RESOURCE_CONFIG=$(jq -n --arg name "${{ parameters.HOST_UUID }}" '{name: $name}')

              # Add NUM_SOCKETS if not empty
              if [ -n "$NUM_SOCKETS" ]; then
                RESOURCE_CONFIG=$(echo "$RESOURCE_CONFIG" | jq --argjson num_sockets "$NUM_SOCKETS" '. + {num_sockets: $num_sockets}')
                echo "✅ NUM_SOCKETS added to resource_config"
              else
                echo "⏭️  NUM_SOCKETS is empty, skipping"
              fi

              # Add MEMORY_SIZE_MIB if not empty
              if [ -n "$MEMORY_SIZE_MIB" ]; then
                RESOURCE_CONFIG=$(echo "$RESOURCE_CONFIG" | jq --argjson memory_size_mib "$MEMORY_SIZE_MIB" '. + {memory_size_mib: $memory_size_mib}')
                echo "✅ MEMORY_SIZE_MIB added to resource_config"
              else
                echo "⏭️  MEMORY_SIZE_MIB is empty, skipping"
              fi

              echo ""
              echo -e "\e[32mFinal resource_config:"
              echo "$RESOURCE_CONFIG" | jq .

              # Update the pipeline variable for downstream steps/jobs
              echo "##vso[task.setvariable variable=resource_config]$RESOURCE_CONFIG"
        displayName: 'Validate Resize Parameters'
        

      - template: ../Templates/setupAgent.yaml
        parameters:
          IAC_TOOL: ${{ parameters.IAC_TOOL }}
          TEST_RUN: ${{ parameters.TEST_RUN }}
          RESOURCE_TYPE: ${{ parameters.RESOURCE_TYPE }}
          OPERATION_TYPE: ${{ parameters.OPERATION_TYPE }}
          ACTION: ${{ parameters.ACTION }}
          dependsOn: CheckoutSelf  

      - template: ../Templates/manageResource.yaml
        parameters:
          IAC_TOOL: ${{ parameters.IAC_TOOL }}
          TEST_RUN: ${{ parameters.TEST_RUN }}
          RESOURCE_TYPE: ${{ parameters.RESOURCE_TYPE }}
          OPERATION_TYPE: ${{ parameters.OPERATION_TYPE }}
          ACTION: ${{ parameters.ACTION }}
          SCTASKID: ${{ parameters.SCTASKID }}
          UUID: ${{ parameters.UUID }}
          HOST_UUID: ${{ parameters.HOST_UUID }}
          RESOURCE_CONFIG:   $(resource_config)
          dependsOn: SetupAgent

        
